<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Matnshunoslik platformasi — buyuk mualliflar galereyasi. Navoiy, Beruniy, Koshg'ariy, Ibn Sino, Bobur va boshqalar haqida batafsil ma'lumot." />
  <title>Mualliflar Galereyasi — Matnshunoslik Platformasi</title>
  <link rel="stylesheet" href="css/main.css" />
  <link rel="stylesheet" href="css/extras.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>✒️</text></svg>" />
  <style>
    /* ===== SAHIFAGA XOS STILLAR ===== */
    .page-hero {
      padding: 140px 0 60px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .page-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.08), transparent 60%);
      pointer-events: none;
    }
    .page-hero-icon { font-size: 3rem; margin-bottom: 16px; display: block; }
    .page-hero-title { font-size: clamp(2rem, 4vw, 3rem); margin-bottom: 12px; }
    .page-hero-desc  { color: var(--text-secondary); max-width: 560px; margin: 0 auto 36px; }

    /* Filtr va qidiruv */
    .filter-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 16px;
    }
    .filter-btn {
      padding: 7px 18px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 0.82rem;
      font-family: var(--font-body);
      font-weight: 500;
      transition: all var(--transition-fast);
    }
    .filter-btn:hover  { border-color: var(--border-hover); color: var(--text-primary); }
    .filter-btn.active { background: var(--gold-glow); border-color: var(--gold); color: var(--gold); }

    .search-bar { display:flex; justify-content:center; margin-bottom: 48px; }
    .search-bar .search-box { max-width: 480px; width: 100%; }

    /* Mualliflar gridi */
    .authors-page-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
    }
    .author-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      overflow: hidden;
      cursor: pointer;
      transition: all var(--transition-base);
      position: relative;
    }
    .author-card::before {
      content:''; position:absolute; top:0; left:0; right:0;
      height:3px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0; transition: opacity var(--transition-base);
    }
    .author-card:hover { border-color:var(--border-hover); transform:translateY(-6px); box-shadow:var(--shadow-gold); }
    .author-card:hover::before { opacity:1; }

    .author-card-header {
      background: linear-gradient(145deg, var(--bg-card), var(--bg-accent));
      padding: 32px 24px 24px;
      display: flex; align-items: flex-start; gap: 16px;
    }
    .author-avatar {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--gold-glow); border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.8rem; flex-shrink: 0;
    }
    .author-meta { flex: 1; }
    .author-name { font-family: var(--font-display); font-size: 1.15rem; margin-bottom: 4px; }
    .author-years { font-size: 0.8rem; color: var(--gold); margin-bottom: 6px; }
    .author-region { font-size: 0.78rem; color: var(--text-muted); }

    .author-card-body { padding: 20px 24px; }
    .author-bio {
      font-size: 0.85rem; color: var(--text-secondary);
      line-height: 1.6; margin-bottom: 16px;
      display: -webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden;
    }
    .author-card-footer {
      padding: 14px 24px; border-top: 1px solid var(--divider);
      display:flex; align-items:center; justify-content:space-between;
    }
    .author-works-count { font-size: 0.78rem; color: var(--text-muted); }
    .author-read-more { font-size: 0.8rem; color: var(--gold); font-weight: 500; }

    /* Modal */
    .author-modal { max-width: 720px; }
    .modal-author-header {
      display: flex; gap: 20px; align-items: flex-start;
      padding: 28px 28px 20px; border-bottom: 1px solid var(--divider);
    }
    .modal-avatar {
      width: 80px; height: 80px; border-radius: 50%;
      background: var(--gold-glow); border: 2px solid var(--gold);
      display:flex; align-items:center; justify-content:center;
      font-size: 2.2rem; flex-shrink:0;
    }
    .modal-author-info h2 { font-size: 1.5rem; margin-bottom: 6px; }
    .modal-author-info p  { font-size: 0.85rem; color: var(--text-secondary); margin: 0; }

    .modal-section { padding: 0 28px; margin: 20px 0; }
    .modal-section-title {
      font-family: var(--font-display); font-size: 1rem;
      color: var(--gold); margin-bottom: 10px;
      display:flex; align-items:center; gap:8px;
    }
    .modal-divider { height:1px; background: var(--divider); margin: 16px 28px; }

    .modal-works-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .modal-works-list li {
      padding:10px 14px; background:var(--bg-glass-light);
      border:1px solid var(--border); border-radius:var(--border-radius-sm);
      font-size:0.85rem; display:flex; align-items:center; gap:10px;
    }

    /* Yo'q natija */
    .no-results {
      grid-column: 1 / -1; text-align:center;
      padding: 80px 0; color: var(--text-muted);
    }
    .no-results-icon { font-size: 3rem; display:block; margin-bottom:12px; }

    /* Section */
    .authors-section { padding: 20px 0 80px; }
  </style>
</head>
<body data-page-key="authors.title">
  <div id="nav-container"></div>

  <main class="pt-nav">
    <!-- Hero -->
    <section class="page-hero">
      <div class="container">
        <span class="page-hero-icon">✒️</span>
        <div class="section-label" data-i18n="sections.notable_authors"></div>
        <h1 class="page-hero-title" data-i18n="authors.title"></h1>
        <p class="page-hero-desc" data-i18n="authors.desc"></p>

        <!-- Filtrlar -->
        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-filter="all" data-i18n="common.all"></button>
          <button class="filter-btn" data-filter="X-XI">X–XI asr</button>
          <button class="filter-btn" data-filter="XV">XV asr</button>
          <button class="filter-btn" data-filter="XVI">XV–XVI asr</button>
          <button class="filter-btn" data-filter="poetry">She'riyat</button>
          <button class="filter-btn" data-filter="science">Ilm-fan</button>
          <button class="filter-btn" data-filter="linguistics">Tilshunoslik</button>
        </div>

        <!-- Qidiruv -->
        <div class="search-bar">
          <div class="search-box">
            <input type="search" id="author-search" class="search-input"
              data-i18n-placeholder="search.placeholder" autocomplete="off" />
            <span class="search-icon">🔍</span>
          </div>
        </div>
      </div>
    </section>

    <!-- Mualliflar gridi -->
    <section class="authors-section">
      <div class="container">
        <div class="authors-page-grid stagger-children" id="authors-grid">
          <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="author-modal">
    <div class="modal author-modal" id="author-modal-content">
      <button class="modal-close" id="author-modal-close" style="position:absolute;top:16px;right:16px">✕</button>
      <div id="author-modal-body"></div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    let authorsData = [];
    let activeFilter = 'all';
    let searchQuery  = '';

    async function PageInit() {
      authorsData = await DataLoader.load('mualliflar');
      renderAuthors();
      initFilters();
      initSearch();
    }

    function renderAuthors() {
      const grid = document.getElementById('authors-grid');
      const lang = I18n.getLang();

      const filtered = authorsData.filter(a => {
        // Filtr
        if (activeFilter !== 'all') {
          const era    = I18n.tObj(a.era) || '';
          const genres = a.genres || [];
          const matchEra   = era.includes(activeFilter);
          const matchGenre = genres.includes(activeFilter);
          if (!matchEra && !matchGenre) return false;
        }
        // Qidiruv
        if (searchQuery) {
          const name = I18n.tObj(a.name || {}).toLowerCase();
          if (!name.includes(searchQuery.toLowerCase())) return false;
        }
        return true;
      });

      if (!filtered.length) {
        grid.innerHTML = `<div class="no-results"><span class="no-results-icon">🔍</span><p data-i18n="search.no_results"></p></div>`;
        return;
      }

      const badgeCls = { gold:'badge-gold', leather:'badge-leather', ruby:'badge-ruby', emerald:'badge-emerald', sapphire:'badge-sapphire', amethyst:'badge-amethyst' };
      const genreEmoji = { poetry:'📜', prose:'📖', history:'📚', science:'⚗️', linguistics:'🔤' };

      grid.innerHTML = filtered.map(a => {
        const name   = I18n.tObj(a.name);
        const era    = I18n.tObj(a.era);
        const region = I18n.tObj(a.region);
        const bio    = I18n.tObj(a.bio) || '';
        const badge  = badgeCls[a.badge] || 'badge-gold';
        const genres = (a.genres || []).map(g => `<span class="badge badge-leather" style="font-size:0.65rem">${genreEmoji[g]||''} ${g}</span>`).join(' ');

        return `
        <article class="author-card fade-in" onclick="openAuthorModal('${a.id}')">
          <div class="author-card-header">
            <div class="author-avatar">✒️</div>
            <div class="author-meta">
              <h2 class="author-name">${name}</h2>
              <div class="author-years">📅 ${a.born}–${a.died}</div>
              <div class="author-region">📍 ${region}</div>
            </div>
            <span class="badge ${badge}">${era}</span>
          </div>
          <div class="author-card-body">
            <p class="author-bio">${bio}</p>
            <div style="display:flex;gap:4px;flex-wrap:wrap">${genres}</div>
          </div>
          <div class="author-card-footer">
            <span class="author-works-count">📜 ${a.works_count || 0} ta asar</span>
            <span class="author-read-more">Batafsil →</span>
          </div>
        </article>`;
      }).join('');

      ScrollAnim.init();
      // i18n
      grid.querySelectorAll('[data-i18n]').forEach(el => {
        const v = I18n.t(el.dataset.i18n); if (v !== el.dataset.i18n) el.textContent = v;
      });
    }

    function openAuthorModal(id) {
      const author = authorsData.find(a => a.id === id);
      if (!author) return;

      const name   = I18n.tObj(author.name);
      const era    = I18n.tObj(author.era);
      const region = I18n.tObj(author.region);
      const bio    = I18n.tObj(author.bio) || '';
      const env    = I18n.tObj(author.scholarly_env) || '';

      document.getElementById('author-modal-body').innerHTML = `
        <div class="modal-author-header">
          <div class="modal-avatar">✒️</div>
          <div class="modal-author-info">
            <h2>${name}</h2>
            <p>📅 ${author.born}–${author.died} &nbsp;|&nbsp; 📍 ${region} &nbsp;|&nbsp; ${era}</p>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">📖 Tarjimayi hol</div>
          <p style="font-size:0.9rem;color:var(--text-secondary);line-height:1.7">${bio}</p>
        </div>
        <div class="modal-divider"></div>

        ${env ? `
        <div class="modal-section">
          <div class="modal-section-title">🏛️ Ilmiy muhit</div>
          <p style="font-size:0.88rem;color:var(--text-secondary);line-height:1.7">${env}</p>
        </div>
        <div class="modal-divider"></div>` : ''}

        <div class="modal-section">
          <div class="modal-section-title">📜 Asosiy asarlari (${author.works_count || 0} ta)</div>
          <ul class="modal-works-list">
            ${(author.key_works || []).map(w => `<li><span>📜</span> <span style="color:var(--text-primary)">${w}</span></li>`).join('')}
          </ul>
        </div>
        <div class="modal-divider"></div>

        <div class="modal-section" style="padding-bottom:24px">
          <div class="modal-section-title">🔬 Tadqiqotchilar</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap">
            ${(author.researchers || []).map(r => `<span class="badge badge-gold">${r}</span>`).join('')}
          </div>
        </div>`;

      Modal.open('author-modal');
    }

    function initFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          renderAuthors();
        });
      });
    }

    function initSearch() {
      const input = document.getElementById('author-search');
      if (!input) return;
      let timer;
      input.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => { searchQuery = input.value.trim(); renderAuthors(); }, 300);
      });
    }

    document.getElementById('author-modal-close').addEventListener('click', () => Modal.close('author-modal'));

    I18n.onChange(async () => { renderAuthors(); });
  </script>

  <script src="js/effects.js"></script>
  <script src="js/ai-assistant.js"></script>
</body>
</html>

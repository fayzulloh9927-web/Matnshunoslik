<!DOCTYPE html>
<html lang="uz" dir="ltr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Matnshunoslik va manbashunoslik sohasidagi olimlar — Hamid Sulaymon, Porso Shamsiev, Natan Mallayev, Aziz Qayumov va boshqalar."/>
  <title>Tadqiqotchilar — Matnshunoslik Platformasi</title>
  <link rel="stylesheet" href="css/main.css"/>
  <link rel="stylesheet" href="css/extras.css"/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔍</text></svg>"/>
  <style>
    .page-hero { padding:140px 0 60px; text-align:center; position:relative; overflow:hidden; }
    .page-hero::before { content:''; position:absolute; inset:0; background:radial-gradient(ellipse at 50% 0%, rgba(201,162,39,0.07),transparent 60%); pointer-events:none; }
    .page-hero-icon { font-size:3rem; margin-bottom:16px; display:block; }

    .filter-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
    .filter-btn { padding:7px 18px; border-radius:100px; border:1px solid var(--border); background:transparent; color:var(--text-secondary); cursor:pointer; font-size:0.82rem; font-family:var(--font-body); font-weight:500; transition:all var(--transition-fast); }
    .filter-btn:hover { border-color:var(--border-hover); color:var(--text-primary); }
    .filter-btn.active { background:var(--gold-glow); border-color:var(--gold); color:var(--gold); }

    .search-bar { display:flex; justify-content:center; margin-bottom:48px; }
    .search-bar .search-box { max-width:480px; width:100%; }

    /* Tadqiqotchi kartochkasi */
    .researchers-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 24px;
    }
    .researcher-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--border-radius);
      overflow: hidden; cursor:pointer;
      transition: all var(--transition-base);
      position: relative;
    }
    .researcher-card::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, transparent, var(--gold), transparent); opacity:0; transition:opacity var(--transition-base); }
    .researcher-card:hover { border-color:var(--border-hover); transform:translateY(-6px); box-shadow:var(--shadow-gold); }
    .researcher-card:hover::before { opacity:1; }

    .researcher-card-top { padding:28px 24px 16px; border-bottom:1px solid var(--divider); }
    .researcher-header { display:flex; gap:14px; align-items:flex-start; margin-bottom:16px; }
    .researcher-avatar { width:56px; height:56px; border-radius:50%; background:rgba(201,162,39,0.1); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:1.5rem; flex-shrink:0; }
    .researcher-name { font-family:var(--font-display); font-size:1.1rem; margin-bottom:4px; }
    .researcher-years { font-size:0.78rem; color:var(--gold); margin-bottom:4px; }
    .researcher-inst  { font-size:0.75rem; color:var(--text-muted); line-height:1.4; }
    .researcher-spec  { font-size:0.82rem; color:var(--text-secondary); font-style:italic; }

    .researcher-card-body { padding:16px 24px; }
    .researcher-bio { font-size:0.83rem; color:var(--text-secondary); line-height:1.6; display:-webkit-box; -webkit-line-clamp:3; -webkit-box-orient:vertical; overflow:hidden; margin-bottom:12px; }
    .researcher-pubs { display:flex; gap:6px; align-items:center; }
    .pub-count { font-size:0.78rem; color:var(--text-muted); }

    .researcher-card-footer { padding:12px 24px; border-top:1px solid var(--divider); display:flex; justify-content:space-between; align-items:center; }

    /* Jarayon qadamlari */
    .process-steps { display:flex; flex-direction:column; gap:0; }
    .process-step { display:flex; gap:16px; align-items:flex-start; position:relative; padding-bottom:20px; }
    .process-step:last-child { padding-bottom:0; }
    .process-step::before { content:''; position:absolute; left:19px; top:40px; bottom:0; width:2px; background:var(--divider); }
    .process-step:last-child::before { display:none; }
    .step-circle { width:40px; height:40px; border-radius:50%; background:var(--gold-glow); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:1rem; flex-shrink:0; }
    .step-content h4 { font-size:0.9rem; margin-bottom:4px; }
    .step-content p  { font-size:0.8rem; color:var(--text-secondary); margin:0; line-height:1.5; }

    /* Modal */
    .researcher-modal { max-width:760px; }
    .modal-researcher-header { display:flex; gap:20px; align-items:flex-start; padding:28px 28px 20px; border-bottom:1px solid var(--divider); }
    .modal-researcher-avatar { width:80px; height:80px; border-radius:50%; background:rgba(201,162,39,0.1); border:2px solid var(--gold); display:flex; align-items:center; justify-content:center; font-size:2.2rem; flex-shrink:0; }
    .modal-section { padding:0 28px; margin:20px 0; }
    .modal-section-title { font-family:var(--font-display); font-size:1rem; color:var(--gold); margin-bottom:10px; display:flex; align-items:center; gap:8px; }
    .modal-divider { height:1px; background:var(--divider); margin:16px 28px; }

    .pub-list { list-style:none; display:flex; flex-direction:column; gap:8px; }
    .pub-item { padding:12px 14px; background:var(--bg-glass-light); border:1px solid var(--border); border-radius:var(--border-radius-sm); }
    .pub-title { font-size:0.88rem; font-weight:600; color:var(--text-primary); margin-bottom:4px; }
    .pub-meta  { font-size:0.75rem; color:var(--text-muted); }

    .relations-tags { display:flex; gap:8px; flex-wrap:wrap; }
    .relation-tag { padding:5px 12px; border-radius:100px; background:var(--gold-glow); border:1px solid rgba(201,162,39,0.3); color:var(--gold); font-size:0.78rem; }

    .section-padding { padding:20px 0 80px; }
    .no-results { grid-column:1/-1; text-align:center; padding:80px 0; color:var(--text-muted); }
    .no-results-icon { font-size:3rem; display:block; margin-bottom:12px; }
  </style>
</head>
<body data-page-key="researchers.title">
  <div id="nav-container"></div>

  <main class="pt-nav">
    <section class="page-hero">
      <div class="container">
        <span class="page-hero-icon">🔍</span>
        <div class="section-label" data-i18n="researchers.title"></div>
        <h1 style="font-size:clamp(2rem,4vw,3rem);margin-bottom:12px" data-i18n="researchers.title"></h1>
        <p style="color:var(--text-secondary);max-width:560px;margin:0 auto 36px" data-i18n="researchers.desc"></p>

        <div class="filter-bar" id="filter-bar">
          <button class="filter-btn active" data-filter="all" data-i18n="common.all"></button>
          <button class="filter-btn" data-filter="navoi">Navoiy tadqiqotchisi</button>
          <button class="filter-btn" data-filter="qolyozma">Qo'lyozmashunos</button>
          <button class="filter-btn" data-filter="tarix">Adabiyot tarixchisi</button>
          <button class="filter-btn" data-filter="XX">XX asr</button>
        </div>

        <div class="search-bar">
          <div class="search-box">
            <input type="search" id="researcher-search" class="search-input"
              data-i18n-placeholder="search.placeholder" autocomplete="off"/>
            <span class="search-icon">🔍</span>
          </div>
        </div>
      </div>
    </section>

    <section class="section-padding">
      <div class="container">
        <div class="researchers-grid stagger-children" id="researchers-grid">
          <div class="loading-overlay" style="grid-column:1/-1"><div class="spinner"></div></div>
        </div>
      </div>
    </section>
  </main>

  <!-- Modal -->
  <div class="modal-overlay" id="researcher-modal">
    <div class="modal researcher-modal" style="position:relative">
      <button class="modal-close" id="researcher-modal-close" style="position:absolute;top:16px;right:16px">✕</button>
      <div id="researcher-modal-body"></div>
    </div>
  </div>

  <div id="footer-container"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/main.js"></script>
  <script src="js/supabase.js"></script>
  <script>
    let researchersData = [];
    let activeFilter = 'all';
    let searchQuery  = '';

    async function PageInit() {
      researchersData = await DataLoader.load('tadqiqotchilar');
      renderResearchers();
      initFilters();
      initSearch();
    }

    function renderResearchers() {
      const grid = document.getElementById('researchers-grid');
      const badgeCls = { gold:'badge-gold', leather:'badge-leather', ruby:'badge-ruby', emerald:'badge-emerald', sapphire:'badge-sapphire' };

      const filtered = researchersData.filter(r => {
        if (activeFilter !== 'all') {
          const spec = I18n.tObj(r.specialization || {}).toLowerCase();
          const born = r.born || 0;
          if (activeFilter === 'navoi'   && !spec.includes('navoiy'))       return false;
          if (activeFilter === 'qolyozma'&& !spec.includes('qo\'lyozma'))   return false;
          if (activeFilter === 'tarix'   && !spec.includes('tarix'))        return false;
          if (activeFilter === 'XX'      && (born < 1900 || born >= 2000))  return false;
        }
        if (searchQuery) {
          const name = I18n.tObj(r.name || {}).toLowerCase();
          if (!name.includes(searchQuery.toLowerCase())) return false;
        }
        return true;
      });

      if (!filtered.length) {
        grid.innerHTML = `<div class="no-results"><span class="no-results-icon">🔍</span><p data-i18n="search.no_results">Hech narsa topilmadi</p></div>`;
        return;
      }

      grid.innerHTML = filtered.map(r => {
        const name  = I18n.tObj(r.name);
        const spec  = I18n.tObj(r.specialization || {});
        const inst  = I18n.tObj(r.institution || {});
        const bio   = I18n.tObj(r.bio || {});
        const badge = badgeCls[r.badge] || 'badge-gold';
        const pubs  = (r.key_publications || []).length;

        return `
        <article class="researcher-card fade-in" onclick="openResearcherModal('${r.id}')">
          <div class="researcher-card-top">
            <div class="researcher-header">
              <div class="researcher-avatar">🔍</div>
              <div>
                <h2 class="researcher-name">${name}</h2>
                <div class="researcher-years">📅 ${r.born || '?'}–${r.died || '?'}</div>
                <div class="researcher-inst">🏛️ ${inst}</div>
              </div>
              <span class="badge ${badge}" style="flex-shrink:0">${r.born ? (Math.floor(r.born/100)+1) + '-asr' : ''}</span>
            </div>
            <p class="researcher-spec">🎯 ${spec}</p>
          </div>
          <div class="researcher-card-body">
            <p class="researcher-bio">${bio}</p>
            <div class="researcher-pubs">
              <span class="pub-count">📚 ${pubs} ta asosiy nashr</span>
            </div>
          </div>
          <div class="researcher-card-footer">
            <span style="font-size:0.78rem;color:var(--text-muted)">🤝 ${(r.relations || []).length} ta ilmiy aloqa</span>
            <span style="font-size:0.8rem;color:var(--ruby);font-weight:500">Profil →</span>
          </div>
        </article>`;
      }).join('');

      ScrollAnim.init();
    }

    function openResearcherModal(id) {
      const r = researchersData.find(x => x.id === id);
      if (!r) return;

      const name = I18n.tObj(r.name);
      const spec = I18n.tObj(r.specialization || {});
      const inst = I18n.tObj(r.institution || {});
      const bio  = I18n.tObj(r.bio || {});
      const proc = I18n.tObj(r.research_process || {});
      const pubs = r.key_publications || [];

      document.getElementById('researcher-modal-body').innerHTML = `
        <div class="modal-researcher-header">
          <div class="modal-researcher-avatar">🔍</div>
          <div style="flex:1">
            <h2 style="font-size:1.5rem;margin-bottom:6px">${name}</h2>
            <p style="font-size:0.85rem;color:var(--gold);margin-bottom:4px">🎯 ${spec}</p>
            <p style="font-size:0.82rem;color:var(--text-muted);margin:0">📅 ${r.born||'?'}–${r.died||'?'} &nbsp;|&nbsp; 🏛️ ${inst}</p>
          </div>
        </div>

        <div class="modal-section">
          <div class="modal-section-title">📖 Tarjimayi hol</div>
          <p style="font-size:0.88rem;color:var(--text-secondary);line-height:1.7">${bio}</p>
        </div>
        <div class="modal-divider"></div>

        ${proc ? `
        <div class="modal-section">
          <div class="modal-section-title">🔍 Tadqiqot jarayoni</div>
          <p style="font-size:0.88rem;color:var(--text-secondary);line-height:1.7;margin-bottom:16px">${proc}</p>
          <div class="process-steps">
            <div class="process-step">
              <div class="step-circle">📦</div>
              <div class="step-content">
                <h4>Manba to'plash</h4>
                <p>Kutubxona va arxivlarda qo'lyozmalar, matbaa nashrlari va hujjatlarni to'plash</p>
              </div>
            </div>
            <div class="process-step">
              <div class="step-circle">🔍</div>
              <div class="step-content">
                <h4>Taqqoslash va tahlil</h4>
                <p>Nusxalar o'rtasidagi farqlarni aniqlash, birlamchi matnni belgilash</p>
              </div>
            </div>
            <div class="process-step">
              <div class="step-circle">✍️</div>
              <div class="step-content">
                <h4>Tanqidiy matn tayyorlash</h4>
                <p>Ilmiy-tanqidiy matn, izohlar va variant ro'yxatini tayyorlash</p>
              </div>
            </div>
            <div class="process-step">
              <div class="step-circle">📗</div>
              <div class="step-content">
                <h4>Nashr va tarqatish</h4>
                <p>Ilmiy nashriyotda chop etish, ilmiy hamjamiyatga taqdim etish</p>
              </div>
            </div>
          </div>
        </div>
        <div class="modal-divider"></div>` : ''}

        ${pubs.length ? `
        <div class="modal-section">
          <div class="modal-section-title">📚 Asosiy nashrlar</div>
          <ul class="pub-list">
            ${pubs.map(p => `
              <li class="pub-item">
                <div class="pub-title">${I18n.tObj(p.title)}</div>
                <div class="pub-meta">📅 ${p.year} &nbsp;|&nbsp; ${p.type}</div>
              </li>`).join('')}
          </ul>
        </div>
        <div class="modal-divider"></div>` : ''}

        <div class="modal-section" style="padding-bottom:24px">
          <div class="modal-section-title">🤝 Ilmiy aloqalar</div>
          <div class="relations-tags">
            ${(r.relations || []).map(rel => `<span class="relation-tag">${rel}</span>`).join('')}
          </div>
        </div>`;

      Modal.open('researcher-modal');
    }

    function initFilters() {
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          activeFilter = btn.dataset.filter;
          renderResearchers();
        });
      });
    }

    function initSearch() {
      const input = document.getElementById('researcher-search');
      if (!input) return;
      let timer;
      input.addEventListener('input', () => {
        clearTimeout(timer);
        timer = setTimeout(() => { searchQuery = input.value.trim(); renderResearchers(); }, 300);
      });
    }

    document.getElementById('researcher-modal-close').addEventListener('click', () => Modal.close('researcher-modal'));
    I18n.onChange(async () => { renderResearchers(); });
  </script>

  <script src="js/effects.js"></script>
  <script src="js/ai-assistant.js"></script>
</body>
</html>
